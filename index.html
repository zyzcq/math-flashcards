<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>复习</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="home-page">
    <header class="home-header">
        <div class="home-title">
            <h1>复习</h1>
        </div>
        <div class="home-session">
            <span id="user-display" class="user-chip" aria-live="polite"></span>
            <button type="button" id="theme-toggle-btn" class="theme-toggle-button" aria-label="切换主题">
                <i class="fa-solid fa-sun theme-icon" id="theme-icon" aria-hidden="true"></i>
            </button>
            <button type="button" id="logout-btn" class="logout-button" aria-label="退出登录">
                <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
                <span>退出</span>
            </button>
        </div>
    </header>

    <main id="main-container" class="home-main"></main>

    <noscript>
        <div class="empty-state">
            <p>请启用 JavaScript 后继续学习。</p>
        </div>
    </noscript>

    <script src="data.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
