<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>复习网站 - 首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="min-h-screen p-6 md:p-10 max-w-4xl mx-auto">

    <header class="mb-10 mt-4 flex justify-between items-start">
        <div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">知识库与记忆闪卡</h1>
            <p class="text-sm text-slate-500 mt-2 font-medium">高效复习 · 核心考点突破</p>
        </div>
        <div class="flex items-center gap-3 mt-1">
            <span id="user-display" class="text-sm font-bold text-slate-600"></span>
            <button onclick="handleLogout()" class="h-9 px-4 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold transition-colors active:scale-95">
                <i class="fa-solid fa-right-from-bracket mr-1"></i>退出
            </button>
        </div>
    </header>

    <div id="main-container"></div>

    <script src="data.js"></script>
    <script src="js/index.js"></script>
    <script>
        (function checkLogin() {
            const session = localStorage.getItem('math_flashcard_session');
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            const { username } = JSON.parse(session);
            document.getElementById('user-display').textContent = username;
        })();

        function handleLogout() {
            localStorage.removeItem('math_flashcard_session');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
