<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>登录</title>

<!-- 引入全局与登录页专属样式 -->
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script>
// 初始化主题
const savedTheme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
</script>
</head>

<body>
<div class="scene-glow"></div>

<div class="login-card">
    <div class="login-avatar">
        <i class="fa-solid fa-user"></i>
    </div>

    <div class="login-field">
        <i class="fa-solid fa-user login-field-icon"></i>
        <input type="text" id="login-username" placeholder="用户名" autocomplete="username" aria-label="用户名">
        <span class="field-underline"></span>
    </div>

    <div class="login-field">
        <i class="fa-solid fa-lock login-field-icon"></i>
        <input type="password" id="login-password" placeholder="密码" autocomplete="current-password" aria-label="密码">
        <button type="button" class="toggle-pwd" onclick="togglePassword('login-password', this)" aria-label="显示或隐藏密码">
            <i class="fa-solid fa-eye"></i>
        </button>
        <span class="field-underline"></span>
    </div>

    <button type="button" onclick="handleLogin()" class="login-btn">
        <i class="fa-solid fa-arrow-right-to-bracket"></i>
        <span>登录</span>
    </button>
</div>

<div id="toast"></div>

<script>
const SESSION_KEY = 'math_flashcard_session';
const VALID_USER = { username: 'zyz', password: '123' };

function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.opacity = '1';
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(() => t.style.opacity = '0', 1800);
}

function togglePassword(id, btn){
    const input = document.getElementById(id), icon = btn.querySelector('i');
    if(input.type === 'password'){ input.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
    else { input.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
}

function handleLogin(){
    const u = document.getElementById('login-username').value.trim();
    const p = document.getElementById('login-password').value;
    if(!u || !p){ showToast('请输入账号和密码'); return; }
    if(u !== VALID_USER.username || p !== VALID_USER.password){ showToast('用户名或密码错误'); return; }
    
    // 登录成功时清除分享视图，以便登录用户可以看到完整网站
    localStorage.removeItem('shared_view');
    
    localStorage.setItem(SESSION_KEY, JSON.stringify({ username: u, loginTime: Date.now() }));
    showToast('登录成功');
    setTimeout(() => { window.location.href = 'index.html'; }, 600);
}

(function(){
    const s = localStorage.getItem(SESSION_KEY);
    if(!s) return;

    try {
        const session = JSON.parse(s);
        if(!session.username) throw new Error('Missing username');
        window.location.href = 'index.html';
    } catch (error) {
        localStorage.removeItem(SESSION_KEY);
    }
})();

document.addEventListener('keydown', e => { if(e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
