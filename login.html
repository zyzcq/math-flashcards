<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>登录</title>

<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/login.css">
<script src="https://cdn.tailwindcss.com?plugins=typography"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script>
(function() {
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
})();
</script>
    <script src="js/analytics-config.js"></script>
    <script defer src="js/analytics.js"></script>
</head>

<body>
<div class="scene-glow"></div>

<form id="login-form" class="login-card" autocomplete="on">
    <div class="login-avatar">
        <i class="fa-solid fa-user" aria-hidden="true"></i>
    </div>

    <div class="login-field">
        <i class="fa-solid fa-user login-field-icon" aria-hidden="true"></i>
        <input type="text" id="login-username" placeholder="用户名" autocomplete="username" aria-label="用户名">
        <span class="field-underline"></span>
    </div>

    <div class="login-field">
        <i class="fa-solid fa-lock login-field-icon" aria-hidden="true"></i>
        <input type="password" id="login-password" placeholder="密码" autocomplete="current-password" aria-label="密码">
        <button type="button" class="toggle-pwd" onclick="togglePassword('login-password', this)" aria-label="显示或隐藏密码">
            <i class="fa-solid fa-eye" aria-hidden="true"></i>
        </button>
        <span class="field-underline"></span>
    </div>

    <button type="submit" id="login-submit" class="login-btn">
        <i class="fa-solid fa-arrow-right-to-bracket" aria-hidden="true"></i>
        <span>登录</span>
    </button>
</form>

<div id="toast" role="status" aria-live="polite"></div>

<script src="js/login.js"></script>
</body>
</html>
