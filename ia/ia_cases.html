<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>压轴案例专区</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <style>
        :root {
            --paper: #faf9f5;
            --ink: #141413;
            --muted: #6f6b63;
            --line: rgba(20, 20, 19, 0.1);
            --card: rgba(255, 255, 255, 0.76);
            --blue: #8a867d;
            --blue-soft: rgba(138, 134, 125, 0.08);
            --accent: #d97757;
            --accent-soft: rgba(217, 119, 87, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        html {
            background: var(--paper);
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            color: var(--ink);
            background: var(--paper);
            font-family: var(--font-sans);
        }

        .page {
            width: min(1140px, calc(100% - 28px));
            margin: 0 auto;
            padding: 22px 0 56px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-height: 44px;
        }

        .back-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.86rem;
            font-weight: 800;
        }

        .back-link:hover,
        .back-link:focus-visible {
            color: var(--blue);
        }

        .hero {
            padding: 28px 0 22px;
            border-bottom: 1px solid var(--line);
        }

        h1 {
            margin: 14px 0 10px;
            font-family: var(--font-serif);
            font-size: clamp(2.1rem, 5.6vw, 4.4rem);
            line-height: 1.04;
            letter-spacing: 0;
        }

        .section {
            padding-top: 28px;
        }

        h2 {
            margin: 0 0 14px;
            font-family: var(--font-serif);
            font-size: clamp(1.55rem, 3vw, 2.15rem);
            line-height: 1.16;
            letter-spacing: 0;
        }

        .case-stack {
            display: grid;
            gap: 22px;
        }

        .case-card {
            border: 1px solid var(--line);
            border-radius: 12px;
            background: var(--card);
            box-shadow: 0 12px 30px rgba(20, 20, 19, 0.04);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
        }

        .case-question-col {
            padding: 24px;
            border-right: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.55);
        }

        .case-answer-col {
            padding: 24px;
            background: rgba(250, 249, 245, 0.4);
        }

        .case-index {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 999px;
            color: #fff;
            background: var(--blue);
            font-size: 0.95rem;
            font-weight: 900;
        }

        .case-badge-title {
            margin: 14px 0 8px;
            font-size: 1.22rem;
            font-weight: 800;
            letter-spacing: 0;
        }

        .q-text {
            font-size: 0.96rem;
            line-height: 1.7;
            color: var(--muted);
            white-space: pre-wrap;
        }

        .q-tip {
            margin-top: 18px;
            padding: 14px 16px;
            background: var(--accent-soft);
            border-left: 3px solid var(--accent);
            border-radius: 0 8px 8px 0;
            font-size: 0.92rem;
            line-height: 1.6;
        }

        .col-title {
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 750;
        }

        /* Answer List Styles */
        .sa-list { display: flex; flex-direction: column; gap: 1rem; }
        .sa-item { 
            display: flex; 
            gap: 1rem; 
            background: var(--bg-card); 
            padding: 1rem; 
            border-radius: 12px; 
            border: 1px solid var(--line); 
            align-items: flex-start;
            box-shadow: 0 1px 3px rgba(20,20,19,0.015);
        }
        .sa-badge {
            width: 32px; height: 32px; 
            border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 0.9rem; 
            flex-shrink: 0; color: white;
            margin-top: 2px;
        }
        .sa-badge-blue { background: linear-gradient(135deg, var(--blue), #aaa69d); }
        .sa-content { flex: 1; }
        .sa-title { font-size: 1.02rem; display: block; margin-bottom: 0.4rem; color: var(--ink); font-weight: 800; }
        .sa-desc { font-size: 0.92rem; color: var(--muted); line-height: 1.65; display: block; }
        .sa-desc ul { padding-left: 1.2rem; margin: 0.5rem 0; }
        .sa-desc li { margin-bottom: 0.3rem; }

        @media (max-width: 900px) {
            .case-card {
                grid-template-columns: 1fr;
            }

            .case-question-col {
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }
        }

        @media (max-width: 560px) {
            .page {
                width: min(100% - 16px, 800px);
                padding-top: 14px;
            }

            .hero {
                padding-top: 14px;
                padding-bottom: 14px;
            }

            h1 {
                font-size: 2.0rem;
            }

            .case-question-col,
            .case-answer-col {
                padding: 16px 14px;
            }

            .q-text {
                font-size: 0.92rem;
            }

            .sa-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
        }
    </style>
</head>
<body>

    <main class="page">
        <nav class="topbar" aria-label="页面导航">
            <a class="back-link" href="../index.html">返回首页</a>
        </nav>

        <header class="hero">
            <h1>压轴案例专区</h1>
        </header>

        <section class="section" aria-labelledby="cases-title">
            <h2 id="cases-title">案例大题集锦</h2>
            <div class="case-stack" id="cases-container">
                <div style="text-align:center; padding: 3rem; color: var(--muted);">
                    <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i>
                    <p style="margin-top:1rem;">正在加载案例库...</p>
                </div>
            </div>
        </section>
    </main>

    <script src="../data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('cases-container');
            
            let cases = [];
            if (typeof appData !== 'undefined' && appData.ia_short_answers && appData.ia_short_answers.cards) {
                cases = appData.ia_short_answers.cards.filter(c => 
                    c.title.includes('案例') || 
                    c.title.includes('实验7') ||
                    c.q.includes('案例')
                );
            }

            if (cases.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding: 4rem; border: 1px dashed var(--line); border-radius: 12px;">
                        <i class="fa-solid fa-inbox fa-3x" style="color: var(--line); margin-bottom: 1rem;"></i>
                        <p>未在题库中找到压轴案例题。</p>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            
            cases.forEach((c, index) => {
                const card = document.createElement('article');
                card.className = 'case-card';
                
                const tipHtml = c.tip ? `
                    <div class="q-tip">
                        ${c.tip}
                    </div>` : '';
                
                card.innerHTML = `
                    <!-- 左侧：题目与背景 -->
                    <div class="case-question-col">
                        <span class="case-index">${index + 1}</span>
                        <h3 class="case-badge-title">${c.title}</h3>
                        <div class="col-title"><i class="fa-solid fa-clipboard-question"></i> 背景与任务</div>
                        <div class="q-text">${c.q}</div>
                        ${tipHtml}
                    </div>
                    
                    <!-- 右侧：标准答案 -->
                    <div class="case-answer-col">
                        <div class="col-title"><i class="fa-solid fa-lightbulb"></i> 标准解析</div>
                        <div class="answer-content active">
                            ${c.a}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            // 渲染数学公式
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(container, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false
                });
            }
        });
    </script>
</body>
</html>
