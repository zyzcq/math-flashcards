                storyText: "ТЋ░ТЇ«жЄЈтЉѕТїЄТЋ░у║ДуѕєтЈЉ№╝їтЇЋтЈ░У«ЙтцЄТа╣Тюгу«ЌСИЇУ┐ЄТЮЦ№╝ЂСйаТъюТќГт░єуЏ«тЁЅТіЋтљЉС║єС║ЉУ«Ау«ЌтњїУЙ╣у╝ўУ«Ау«Ќ№╝їтѕєжЁЇу«ЌтіЏУхёТ║љ№╝їТЅЊуа┤ТђДУЃйуЊХжбѕсђ?
            },
            { 
                id: "ch6", name: "уггтЁГуФа№╝џтиЦСИџС║њУЂћуйЉСИјуйЉу╗ют«ЅтЁеУдЂу┤а", prefix: "6.",
                role: "­ЪЏА№И?УхЏтЇџт«ѕТюЏУђ?, storyTitle: "жњбжЊЂжЋ┐тЪј№╝џт«ѕтЇФТЋ░ТЇ«уќєтю?,
                storyText: "жџЈуЮђтиЦтјѓт«їтЁеУЂћуйЉ№╝їТйюС╝ЈтюеТџЌтцёуџёж╗Љт«буЏ»СИіС║єСйаС╗гуџёТЋ░ТЇ«сђѓСйау┤ДТђЦжЃеуй▓уйЉу╗ют«ЅтЁежў▓у║┐№╝їТіхтЙАТЂХТёЈТћ╗тЄ╗№╝їС┐ЮтЇФтѕџтѕџт╗║уФІУхиуџётиЦСИџС║њУЂћуйЉсђ?
            },
            { 
                id: "ch7", name: "уггСИЃуФа№╝џтцДТЋ░ТЇ«ТЎ║УЃйСИјУЂћжѓдтГдС╣а", prefix: "уггСИЃуФ?,
                role: "­ЪДЎ ТЋ░ТЇ«уѓ╝жЄЉТю»тБФ", storyTitle: "ТЋ░ТЇ«уѓ╝жЄЉ№╝џУХіућеУХіУЂфТўј",
                storyText: "тиЦтјѓуД»у┤»С║єтаєуД»тдѓт▒▒уџёУ┐љУАїТЋ░ТЇ«сђѓСйат╝ЋтЁЦС║єтцДТЋ░ТЇ«ТЎ║УЃй№╝їућџУЄ│Сй┐ућеС║єРђюУЂћжѓдтГдС╣аРђЮУ┐ЎСИђж╗ЉуДЉТіђ№╝їУ«ЕтцџСИфтиЦтјѓтюеСИЇТ│ёжю▓тЋєСИџТю║т»єуџёТЃЁтєхСИІтЁ▒тљїУ«Гу╗Ѓ AI ТеАтъІсђ?
            },
            { 
                id: "ch8", name: "уггтЁФуФа№╝џтиЦСИџТЎ║УЃйт«џС╣ЅСИјТЋ░тГЌтГфућ?, prefix: "уггтЁФуФ?,
                role: "­Ъїї тГфућЪжђауЅЕСИ?, storyTitle: "у╗ѕТъЂтйбТђЂ№╝џУЎџТІЪСИјуј░т«ъуџёС║цтЊЇ",
                storyText: "Сйау╗ѕС║јУДдтЈіС║єтиЦСИџ App уџётиЁт│░жбєтЪЪсђѓСйатюеУхЏтЇџуЕ║жЌ┤СИГт«їуЙјтцЇтѕ╗С║єСИђт║ДСИђТеАСИђТаиуџёТЋ░тГЌУЎџТІЪтиЦтјѓ№╝ѕТЋ░тГЌтГфућЪ№╝Ѕ№╝їтюеУЎџТІЪСИГжбёТ╝ћ№╝їтюеуј░т«ъСИГТЅДУАїсђѓТЎ║УЃйтѕХжђа№╝їтцДтіЪтЉіТѕљ№╝?
            },
            { 
                id: "ch9", name: "У«ЙУ«АТАѕСЙІ№╝џт«ъжф?7 ТЎ║УЃйУ«ЙтцЄуѓ╣ТБђ APP", prefix: "т«ъжфї7",
                role: "­ЪЉЉ ждќтИГТъХТъётИ?, storyTitle: "т«ъТѕўТ╝ћу╗Ѓ№╝џТ»ЋСИџУ«ЙУ«?,
                storyText: "УГдТіЦтЊЇУхи№╝їУйджЌ┤СИђтЈ░тЁ│жћ«У«ЙтцЄтЄ║уј░т╝ѓтИИ№╝Ђуј░тюе№╝їт░єСйаСИђУи»Ух░ТЮЦтГдтѕ░уџёТЅђТюЅУй»уАгС╗ХуЪЦУ»єУъЇС╝џУ┤»жђџ№╝їт╝ђтЈЉтЄ║РђюТЎ║УЃйУ«ЙтцЄуѓ╣ТБђ AppРђЮ№╝їт«їТѕљСйауџёТ»ЋСИџждќуДђтљД№╝Ђ"
            }
        ];

        // Core Exam keywords for marking as high frequency key cards
        const keyKeywords = [
            "УїЃт╝ЈСИ╗УдЂуЅ╣тЙЂ", "УхІУЃйТіђТю?, "С║ћт▒ѓТгАуџёжЄЉтГЌтА?, "СйюућетљёТў»С╗ђС╣?, "тЊфтЄаСИфтиЦт║?, "тиЦСИџУй»С╗Ху▒╗тѕФ",
            "ТЋ░ТЇ«т║ЊтЁ│жћ«ТіђТю?, "С╝аТёЪтЎ?, "ТјДтѕХТіђТю?, "УЙ╣у╝ўУ«Ау«Ќ", "ућЪТђЂСйЊу│?, "уйЉу╗ют«ЅтЁе", "УЂћжѓдтГдС╣а", 
            "тиЦСИџТЎ║УЃйуџёт«џС╣?, "ТЋ░тГЌтГфућЪСИГуџётЁ│жћ«ТіђТю?, "т«ъжфї7"
        ];

        function isKeyCard(card) {
            const q = card.q || "";
            const title = card.title || "";
            return keyKeywords.some(keyword => q.includes(keyword) || title.includes(keyword));
        }

        function initReview() {
            const dataSource = typeof appData === 'undefined' ? {} : appData;
            const iaShortAnswers = dataSource.ia_short_answers;
            if (!iaShortAnswers || !Array.isArray(iaShortAnswers.cards)) {
                document.getElementById('sections-wrapper').innerHTML = `
                    <div class="empty-state" style="padding:40px; text-align:center; color:var(--text-weak);">
                        ТюфтіаУййтѕ░У«▓С╣ЅТЋ░ТЇ«№╝їУ»иуА«У«ц data.js жЁЇуй«сђ?                    </div>`;
                return;
            }

            const cards = iaShortAnswers.cards;
            const sectionsWrapper = document.getElementById('sections-wrapper');
            sectionsWrapper.innerHTML = '';

            sectionInfo.forEach((section, secIdx) => {
                const sectionCards = cards.filter(c => {
                    const title = c.title || "";
                    return title.startsWith(section.prefix);
                });

                // Create Section
                const sectionEl = document.createElement('section');
                sectionEl.className = 'section-card';
                sectionEl.id = section.id;

                // Section Header
                const headerEl = document.createElement('div');
                headerEl.className = 'section-header';
                
                const iconContainer = document.createElement('div');
                iconContainer.className = 'section-icon';
                const icons = ['1', '2', '3', '4', '5', '6', '7', '8', 'РџЎ№ИЈ'];
                iconContainer.innerHTML = icons[secIdx] === 'РџЎ№ИЈ' ? '<i class="fa-solid fa-gear"></i>' : `<b>${icons[secIdx]}</b>`;
                
                const titleEl = document.createElement('h2');
                titleEl.textContent = section.name;

                headerEl.appendChild(iconContainer);
                headerEl.appendChild(titleEl);
                sectionEl.appendChild(headerEl);

                // Story Card
                if (section.storyTitle) {
                    const storyEl = document.createElement('div');
                    storyEl.className = 'story-card';
                    storyEl.innerHTML = `
                        <div class="story-role">${section.role}</div>
                        <h3 class="story-title">${section.storyTitle}</h3>
                        <p class="story-text">${section.storyText}</p>
                    `;
                    sectionEl.appendChild(storyEl);
                }

                // Concept Cards List
                const conceptListEl = document.createElement('div');
                conceptListEl.className = 'concept-list';

                if (sectionCards.length === 0) {
                    conceptListEl.innerHTML = `<div style="color:var(--text-weak); font-size:0.9rem; padding:10px 0;">ТџѓТЌаТЋ░ТЇ«</div>`;
                } else {
                    sectionCards.forEach(card => {
                        const isKey = isKeyCard(card);
                        const cardEl = document.createElement('div');
                        cardEl.className = 'concept-card';

                        // Meta Row
                        const metaEl = document.createElement('div');
                        metaEl.className = 'concept-meta';

                        const chapterTag = document.createElement('span');
                        chapterTag.className = 'concept-tag';
                        chapterTag.textContent = card.title;
                        metaEl.appendChild(chapterTag);

                        if (isKey) {
                            const keyBadge = document.createElement('span');
                            keyBadge.className = 'key-badge';
                            keyBadge.innerHTML = `<i class="fa-solid fa-fire"></i> ТаИт┐ЃжФўжбЉУђЃуѓ╣`;
                            metaEl.appendChild(keyBadge);
                        }

                        // Question
                        const qEl = document.createElement('h3');
                        qEl.className = 'concept-q';
                        qEl.innerHTML = card.q;

                        // Mnemonic
                        const mnemonicEl = document.createElement('div');
                        mnemonicEl.className = 'concept-mnemonic';
                        mnemonicEl.innerHTML = `
                            <span class="mnemonic-icon">­ЪДа</span>
                            <div class="mnemonic-content">
                                <strong>У«░т┐єтЈБУ»ђ№╝?/strong>${card.tip || 'ТџѓТЌатЈБУ»ђ'}
                            </div>
                        `;

                        // Answer Detail
                        const aWrapEl = document.createElement('div');
                        aWrapEl.className = 'concept-a-wrap';
                        
                        const aTitle = document.createElement('span');
                        aTitle.className = 'concept-a-title';
                        aTitle.textContent = "тЈѓУђЃУДБТъљСИјтЙЌтѕєУдЂуѓ╣";
                        
                        const aContent = document.createElement('div');
                        aContent.className = 'prose prose-sm';
                        aContent.innerHTML = card.a || 'ТџѓТЌаУ»ду╗єУДБуГћ';

                        aWrapEl.appendChild(aTitle);
                        aWrapEl.appendChild(aContent);

                        cardEl.appendChild(metaEl);
                        cardEl.appendChild(qEl);
                        cardEl.appendChild(mnemonicEl);
                        cardEl.appendChild(aWrapEl);

                        conceptListEl.appendChild(cardEl);
                    });
                }

                sectionEl.appendChild(conceptListEl);
                sectionsWrapper.appendChild(sectionEl);
            });

            // Trigger math rendering
            if (window.renderMathInElement) {
                renderMathInElement(sectionsWrapper, katexOptions);
            }

            setupScrollObserver();
        }

        function scrollToSection(id) {
            const el = document.getElementById(id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function setupScrollObserver() {
            const stations = document.querySelectorAll('.station');
            const sections = sectionInfo.map(sec => document.getElementById(sec.id)).filter(Boolean);
            const progressLine = document.getElementById('svg-progress-line');

            const observerOptions = {
                root: null,
                rootMargin: '-120px 0px -70% 0px',
                threshold: 0
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const sectionId = entry.target.id;
                        
                        stations.forEach(station => {
                            const target = station.getAttribute('data-target');
                            if (target === sectionId) {
                                station.classList.add('active');
                                const container = document.querySelector('.roadmap-container');
                                const rect = station.getBoundingClientRect();
                                const cRect = container.getBoundingClientRect();
                                if (rect.left < cRect.left || rect.right > cRect.right) {
                                    container.scrollTo({
                                        left: station.transform.baseVal[0].matrix.e - 150,
                                        behavior: 'smooth'
                                    });
                                }
                            } else {
                                station.classList.remove('active');
                            }
                        });

                        // Svg progress line computation
                        const activeIndex = sectionInfo.findIndex(sec => sec.id === sectionId);
                        if (activeIndex !== -1) {
                            const xCoordinates = [50, 162, 274, 386, 498, 610, 722, 834, 950];
                            const currentX = xCoordinates[activeIndex];
                            const ratio = (currentX - 50) / 900;
                            progressLine.style.strokeDashoffset = 900 - (900 * ratio);
                        }
                    }
                });
            }, observerOptions);

            sections.forEach(sec => observer.observe(sec));
        }

        window.addEventListener('DOMContentLoaded', initReview);
    </script>
