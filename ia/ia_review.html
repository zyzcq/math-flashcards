<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>工业 App 智能制造冒险大纲</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <style>
        :root {
            --blue-50: #eff6ff;
            --blue-100: #dbeafe;
            --blue-500: #3b82f6;
            --blue-600: #2563eb;
            --blue-700: #1d4ed8;
            --rose-50: #fff1f2;
            --rose-100: #ffe4e6;
            --rose-600: #e11d48;
            --gold-400: #fbbf24;
            --gold-500: #f59e0b;
            --accent-glow: rgba(37, 99, 235, 0.15);
            --xp-bar-bg: rgba(226, 232, 240, 0.8);
            --loading-bg: #0f172a;
            --neon-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
            --gold-glow: rgba(251, 191, 36, 0.35);
        }
        [data-theme="dark"] {
            --blue-50: rgba(37, 99, 235, 0.1);
            --blue-100: rgba(37, 99, 235, 0.2);
            --blue-500: #60a5fa;
            --blue-600: #3b82f6;
            --blue-700: #2563eb;
            --rose-50: rgba(225, 29, 72, 0.15);
            --rose-100: rgba(225, 29, 72, 0.25);
            --rose-600: #fb7185;
            --gold-400: #fbbf24;
            --gold-500: #fb923c;
            --accent-glow: rgba(59, 130, 246, 0.35);
            --xp-bar-bg: rgba(51, 65, 85, 0.6);
            --loading-bg: #020617;
            --neon-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        }

        body { 
            margin: 0; 
            background: var(--bg-app); 
            color: var(--text-main); 
            line-height: 1.6; 
            user-select: none; 
            -webkit-user-select: none;
        }
        
        .review-container { 
            width: min(1080px, calc(100% - 32px)); 
            margin: 0 auto; 
            padding: 20px 0; 
            padding-bottom: 80px; 
        }

        /* Canvas Particle overlay */
        #game-canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 2000; 
        }

        /* Loading Screen */
        .loading-screen { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: var(--loading-bg); 
            z-index: 3000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: opacity 0.5s ease, visibility 0.5s ease; 
            color: white; 
        }
        .loading-screen.hide { 
            opacity: 0; 
            visibility: hidden; 
        }
        .loading-logo { 
            font-size: 3.5rem; 
            margin-bottom: 20px; 
            animation: float 2s infinite alternate; 
        }
        .loading-title { 
            font-size: 1.8rem; 
            font-weight: 900; 
            margin-bottom: 10px; 
            letter-spacing: 2px; 
            text-shadow: var(--neon-shadow); 
        }
        .loading-subtitle { 
            font-size: 0.9rem; 
            opacity: 0.7; 
            margin-bottom: 30px; 
        }
        .loading-bar-outer { 
            width: 260px; 
            height: 12px; 
            border: 2px solid var(--blue-500); 
            border-radius: 10px; 
            overflow: hidden; 
            padding: 1px; 
        }
        .loading-bar-inner { 
            height: 100%; 
            width: 0%; 
            background: var(--blue-500); 
            border-radius: 8px; 
            transition: width 0.1s linear; 
        }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        /* Player Status HUD Panel */
        .hud-panel { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            align-items: center; 
            background: var(--bg-card); 
            border: 2px solid var(--blue-500); 
            border-radius: 16px; 
            padding: 15px 20px; 
            box-shadow: 0 10px 25px var(--accent-glow); 
            margin-bottom: 25px; 
            position: relative;
        }
        .hud-avatar { 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            background: linear-gradient(135deg, var(--blue-500), var(--sky-500)); 
            border: 3px solid var(--blue-100); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-size: 1.8rem; 
        }
        .hud-info { 
            flex: 1; 
            min-width: 200px; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
        }
        .hud-meta { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .player-name { 
            font-weight: 800; 
            font-size: 1.1rem; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .level-badge { 
            background: var(--blue-600); 
            color: white; 
            padding: 2px 8px; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            box-shadow: var(--neon-shadow);
        }
        .xp-text { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 0.8rem; 
            font-weight: bold; 
            color: var(--text-weak); 
        }
        .xp-bar-outer { 
            width: 100%; 
            height: 10px; 
            background: var(--xp-bar-bg); 
            border-radius: 10px; 
            overflow: hidden; 
            border: 1px solid var(--border-color); 
        }
        .xp-bar-inner { 
            height: 100%; 
            width: 0%; 
            background: linear-gradient(90deg, var(--blue-500), var(--sky-500)); 
            transition: width 0.5s cubic-bezier(0.1, 0.8, 0.3, 1); 
        }
        
        .hud-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Mode Toggles */
        .mode-toggles {
            display: flex;
            background: var(--bg-app);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 3px;
            gap: 4px;
        }
        .mode-btn {
            border: none;
            background: transparent;
            color: var(--text-weak);
            padding: 6px 14px;
            border-radius: 9px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.25s;
        }
        .mode-btn.active {
            background: var(--blue-600);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }

        /* Audio Toggle */
        .audio-toggle { 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            border: 1px solid var(--border-color); 
            background: var(--bg-card); 
            color: var(--text-main); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: all 0.2s; 
        }
        .audio-toggle:hover { 
            background: var(--blue-50); 
            color: var(--blue-600); 
            border-color: var(--blue-500); 
        }

        /* Topbar & Sticky SVG Nav */
        .topbar { 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            background: color-mix(in srgb, var(--bg-app) 85%, transparent); 
            border-bottom: 1px solid var(--border-color); 
            padding: 10px 0; 
        }
        .topbar-inner { 
            width: min(1080px, calc(100% - 32px)); 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }
        .topbar-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .topbar a { 
            text-decoration: none; 
            color: var(--text-weak); 
            font-weight: 700; 
            font-size: 0.9rem; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            transition: color 0.2s; 
        }
        .topbar a:hover { 
            color: var(--blue-600); 
        }

        /* SVG Roadmap Styling */
        .roadmap-container { 
            width: 100%; 
            overflow-x: auto; 
            padding: 6px 0; 
            -webkit-overflow-scrolling: touch; 
        }
        .roadmap-container::-webkit-scrollbar { 
            height: 4px; 
        }
        .roadmap-container::-webkit-scrollbar-thumb { 
            background: var(--border-color); 
            border-radius: 4px; 
        }
        .roadmap-svg { 
            display: block; 
            min-width: 900px; 
            height: 50px; 
        }
        .roadmap-line { 
            fill: none; 
            stroke: var(--border-color); 
            stroke-width: 4; 
        }
        .roadmap-progress-line { 
            fill: none; 
            stroke: var(--blue-500); 
            stroke-width: 4; 
            stroke-dasharray: 900; 
            stroke-dashoffset: 900; 
            transition: stroke-dashoffset 0.1s ease; 
        }
        .station { 
            cursor: pointer; 
        }
        .station circle { 
            fill: var(--bg-card); 
            stroke: var(--border-color); 
            stroke-width: 3; 
            transition: all 0.3s ease; 
        }
        .station.active circle { 
            fill: var(--blue-500); 
            stroke: var(--blue-600); 
            filter: drop-shadow(0 0 8px var(--blue-500)); 
        }
        .station text { 
            fill: var(--text-weak); 
            font-family: system-ui, sans-serif; 
            font-size: 10px; 
            font-weight: 600; 
            text-anchor: middle; 
            transition: all 0.3s ease; 
        }
        .station.active text { 
            fill: var(--blue-600); 
            font-weight: 800; 
            font-size: 11px; 
        }

        /* Section Cards */
        .section-card { 
            background: var(--bg-card); 
            border-radius: 16px; 
            padding: 25px; 
            margin-bottom: 25px; 
            box-shadow: var(--list-item-shadow); 
            border: 2px solid var(--border-color); 
            transition: border-color 0.3s, box-shadow 0.3s; 
            scroll-margin-top: 130px; 
        }
        .section-card:hover { 
            border-color: var(--blue-500); 
            box-shadow: 0 10px 30px -10px var(--accent-glow); 
        }
        .section-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--blue-50); 
            padding-bottom: 12px; 
            margin-bottom: 20px; 
        }
        .section-title-wrap { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
        }
        .section-icon { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 40px; 
            height: 40px; 
            border-radius: 10px; 
            background: var(--blue-50); 
            color: var(--blue-600); 
            font-size: 1.2rem; 
            font-weight: bold; 
            flex-shrink: 0; 
        }
        .section-card h2 { 
            margin: 0; 
            font-size: 1.35rem; 
            color: var(--text-main); 
            font-weight: 800; 
        }
        .section-star-status { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 0.85rem; 
            font-weight: 800; 
            color: var(--text-weak); 
            background: var(--blue-50); 
            padding: 4px 12px; 
            border-radius: 20px; 
            border: 1px solid var(--border-color); 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            transition: all 0.3s;
        }
        .section-star-status.perfect {
            color: var(--gold-500);
            border-color: var(--gold-400);
            box-shadow: 0 0 10px var(--gold-glow);
        }

        /* Card list and cards */
        .card-list { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        .card-item { 
            border: 1px solid var(--border-color); 
            border-radius: 14px; 
            padding: 20px; 
            background: var(--bg-card); 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            position: relative; 
            transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1); 
        }
        .card-item.mastered { 
            border-color: var(--gold-400) !important; 
            background: linear-gradient(135deg, var(--bg-card), rgba(251, 191, 36, 0.02)) !important; 
            box-shadow: 0 8px 25px rgba(251, 191, 36, 0.08) !important;
        }
        .card-item-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 12px; 
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 8px;
        }
        .card-title { 
            font-weight: 800; 
            color: var(--blue-600); 
            font-size: 0.95rem; 
            display: flex; 
            align-items: center; 
            gap: 4px; 
        }
        .card-q { 
            font-size: 1.15rem; 
            font-weight: 800; 
            color: var(--text-main); 
            margin: 0; 
            line-height: 1.4;
            border-left: 4px solid var(--blue-500);
            padding-left: 10px;
        }

        .badge-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .key-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--rose-600);
            background: var(--rose-50);
            border: 1px solid var(--rose-100);
            border-radius: 20px;
            animation: pulseGlow 1.8s infinite alternate;
        }
        
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.2); }
            100% { box-shadow: 0 0 0 5px rgba(225, 29, 72, 0.3); }
        }

        /* Frosted Glass Recite Mask */
        .concept-a-wrap {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            min-height: 80px;
            transition: all 0.3s;
            background: rgba(30, 41, 59, 0.2);
            border: 1px solid var(--border-color);
        }
        
        .recite-mask {
            position: absolute;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.4s;
            border-radius: 10px;
        }
        .recite-mask:hover {
            background: rgba(15, 23, 42, 0.65);
        }
        
        .recite-mask-content {
            text-align: center;
            color: var(--blue-400);
            font-size: 0.85rem;
            font-weight: 700;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
            border: 1px dashed rgba(59, 130, 246, 0.4);
            padding: 12px 24px;
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.5);
            animation: pulseGlowCyan 2s infinite alternate;
        }
        
        @keyframes pulseGlowCyan {
            0% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.2); }
            100% { box-shadow: 0 0 0 6px rgba(14, 165, 233, 0.3); }
        }

        .recite-mask.hidden-mask {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Real answer content area */
        .real-answer-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .concept-mnemonic { 
            display: flex; 
            gap: 12px; 
            background: rgba(245, 158, 11, 0.06); 
            border: 1px solid rgba(245, 158, 11, 0.3); 
            border-radius: 8px; 
            padding: 12px 16px; 
            color: var(--text-main); 
            font-size: 0.95rem; 
        }
        .mnemonic-icon { 
            font-size: 1.25rem; 
            line-height: 1; 
        }
        .mnemonic-content { 
            flex: 1; 
        }
        .mnemonic-content strong { 
            color: var(--gold-500); 
            font-weight: 900; 
        }

        .concept-a-detail {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .concept-a-title { 
            font-size: 0.82rem; 
            font-weight: 800; 
            color: var(--text-weak); 
            text-transform: uppercase; 
            display: block; 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 4px; 
        }

        /* Card Actions and Buttons */
        .card-actions {
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
            margin-top: 4px;
        }

        .master-btn {
            border: none;
            padding: 8px 20px;
            font-weight: bold;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .btn-blue {
            background: var(--blue-50);
            color: var(--blue-600);
            border: 1px solid var(--blue-100);
        }
        .btn-blue:hover {
            background: var(--blue-600);
            color: white;
            transform: translateY(-2px);
        }
        
        .btn-gold {
            background: linear-gradient(135deg, var(--gold-400), var(--gold-500));
            color: #1e293b;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
        }
        .btn-gold:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(245, 158, 11, 0.4);
        }

        /* Level Up Modal overlay */
        .level-up-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(8px); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 2500; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.4s ease; 
        }
        .level-up-overlay.show { 
            opacity: 1; 
            pointer-events: auto; 
        }
        .level-up-box { 
            background: var(--bg-card); 
            border: 3px solid var(--gold-400); 
            border-radius: 24px; 
            padding: 40px 30px; 
            text-align: center; 
            max-width: 360px; 
            width: calc(100% - 32px); 
            box-shadow: 0 0 50px rgba(251, 191, 36, 0.4); 
            transform: scale(0.8); 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; 
        }
        .level-up-overlay.show .level-up-box { 
            transform: scale(1); 
        }
        .level-up-banner { 
            font-size: 2.2rem; 
            font-weight: 900; 
            color: var(--gold-400); 
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.6); 
            margin-bottom: 10px; 
            letter-spacing: 2px; 
        }
        .level-up-title { 
            font-size: 1.3rem; 
            font-weight: 800; 
            color: var(--text-main); 
            margin-bottom: 8px; 
        }
        .level-up-subtitle { 
            font-size: 0.9rem; 
            color: var(--text-weak); 
            margin-bottom: 25px; 
            line-height: 1.5; 
        }
        .level-up-btn { 
            background: linear-gradient(135deg, var(--gold-400), var(--gold-500)); 
            color: #0f172a; 
            font-weight: 900; 
            border: none; 
            border-radius: 12px; 
            width: 100%; 
            height: 46px; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: all 0.2s; 
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); 
        }
        .level-up-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 18px rgba(245, 158, 11, 0.5); 
        }

        .glow-ring { 
            position: absolute; 
            top: -50px; 
            left: calc(50% - 50px); 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            background: radial-gradient(circle, rgba(251, 191, 36, 0.2) 0%, transparent 70%); 
            animation: rotateGlow 3s linear infinite; 
            pointer-events: none; 
        }
        
        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            .section-card { padding: 18px 15px; }
            .hud-panel { padding: 12px 15px; gap: 12px; }
            .hud-avatar { width: 40px; height: 40px; font-size: 1.4rem; }
            .hud-controls { width: 100%; justify-content: space-between; margin-top: 5px; }
            .card-item { padding: 16px 12px; }
            .card-q { font-size: 1.05rem; }
        }
    </style>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <script src="../js/analytics-config.js"></script>
    <script defer src="../js/analytics.js"></script>
</head>
<body>

    <!-- Game Opening Loading Screen -->
    <div class="loading-screen" id="loading-screen">
        <div class="loading-logo">⚡</div>
        <div class="loading-title">智能制造冒险讲义</div>
        <div class="loading-subtitle">正在部署工业流水线与复习图谱...</div>
        <div class="loading-bar-outer">
            <div class="loading-bar-inner" id="loading-bar"></div>
        </div>
    </div>

    <!-- Confetti Particle Canvas -->
    <canvas id="game-canvas"></canvas>

    <header class="topbar">
        <div class="topbar-inner">
            <div class="topbar-header">
                <a href="../index.html">
                    <i class="fa-solid fa-angle-left"></i>
                    <span>返回首页</span>
                </a>
                <span style="font-weight: 800; font-size: 0.95rem; color: var(--blue-600);">工业 App 冒险大纲讲义</span>
            </div>
            
            <div class="roadmap-container">
                <svg class="roadmap-svg" viewBox="0 0 1000 50">
                    <!-- Path base line -->
                    <path class="roadmap-line" d="M 50 25 L 950 25" />
                    <!-- Electrified Progress Line -->
                    <path id="svg-progress-line" class="roadmap-progress-line" d="M 50 25 L 950 25" />
                    
                    <!-- Chapter nodes -->

    <script src="../data.js"></script>
    <script>
        const katexOptions = {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false},
                {left: '\\[', right: '\\]', display: true}
            ],

        const sectionInfo = [

            { id: "ch2", name: "第二关：集成电路 (计算机硬件与软件基础)", prefix: "第二章" },
            { id: "ch3", name: "第三关：感知控制 (数字传感与控制技术)", prefix: "3." },
            { id: "ch4", name: "第四关：数据云海 (有线/无线通信及云端边缘)", prefix: "4." },
            { id: "ch5", name: "第五关：生态堡垒 (工业 APP 及其生态体系)", prefix: "5." },
            { id: "ch6", name: "第六关：安全网关 (工业互联网及安全要素)", prefix: "6." },
            { id: "ch7", name: "第七关：智能圣殿 (大数据智能与联邦学习)", prefix: "第七章" },
            { id: "ch8", name: "第八关：数字孪生 (数字孪生系统与关键技术)", prefix: "第八章" },
            { id: "ch9", name: "终极决战：设备点检 (实验 7 智能设备点检 APP)", prefix: "实验7" }
        ];

        // Key high-frequency exam node keywords
        const keyKeywords = [
            "范式主要特征", "赋能技术", "五层次的金字塔", "作用各是什么", "哪几个工序", "工业软件类别",
            "数据库关键技术", "传感器", "控制技术", "边缘计算", "生态体系", "网络安全", "联邦学习", 
            "工业智能的定义", "数字孪生中的关键技术", "实验7"
        ];

        let iaCards = [];
        let masteredCards = new Set();
        let currentLevel = 1;
        let isMuted = false;
        let reciteModeActive = false; // 全局隐写遮罩模式

        const levelTitles = [
            "LV.1 制造小白",
            "LV.2 工业入门",
            "LV.3 产业学徒",
            "LV.4 设备能手",
            "LV.5 系统工匠",
            "LV.6 控制达人",
            "LV.7 网络先锋",
            "LV.8 孪生架构师",
            "LV.9 智能制造大师"
        ];

        // 8-bit Sound synthesizer via Web Audio API
        let audioCtx = null;
        function playTone(freqs, type='sine', duration=0.2, volume=0.08) {
            if (isMuted) return;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                const now = audioCtx.currentTime;
                const gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(volume, now);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                gainNode.connect(audioCtx.destination);

                if (Array.isArray(freqs)) {
                    freqs.forEach((freq, idx) => {
                        const osc = audioCtx.createOscillator();
                        osc.type = type;
                        osc.frequency.setValueAtTime(freq, now + (idx * 0.08));
                        osc.connect(gainNode);
                        osc.start(now + (idx * 0.08));
                        osc.stop(now + (idx * 0.08) + 0.12);
                    });
                } else {
                    const osc = audioCtx.createOscillator();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freqs, now);
                    osc.connect(gainNode);
                    osc.start(now);
                    osc.stop(now + duration);
                }
            } catch(e) {}
        }

        // Confetti particles FX
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createConfetti(x, y) {
            const colors = ['#3b82f6', '#0ea5e9', '#fbbf24', '#f59e0b', '#10b981', '#f43f5e'];
            for (let i = 0; i < 70; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.8) * 15,
                    size: Math.random() * 8 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rot: Math.random() * Math.PI,
                    rotSpeed: (Math.random() - 0.5) * 0.15,
                    opacity: 1
                });
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.35; // gravity
                p.rot += p.rotSpeed;
                p.opacity -= 0.015;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, p.opacity);
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();

                return p.opacity > 0;
            });
            requestAnimationFrame(animateParticles);
        }
        requestAnimationFrame(animateParticles);

        // Preloader progress bar
        function startLoading() {
            const bar = document.getElementById('loading-bar');
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 20;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('loading-screen').classList.add('hide');
                        // play fanfare
                        playTone([261.63, 392.00, 523.25], 'triangle', 0.5, 0.1);
                    }, 300);
                }
                bar.style.width = `${progress}%`;
            }, 60);
        }

        function isKeyCard(card) {
            const q = card.q || "";
            const title = card.title || "";
            return keyKeywords.some(keyword => q.includes(keyword) || title.includes(keyword));
        }

        // Initialize Lecture UI
        function initReview() {
            // Restore silent configurations
            try {
                isMuted = localStorage.getItem('ia_review_muted') === 'true';
                updateAudioIcon();
            } catch(e) {}

            try {
                const savedMode = localStorage.getItem('ia_review_recite_mode');
                reciteModeActive = savedMode === 'true';
                setGlobalModeUI(reciteModeActive ? 'recite' : 'read');
            } catch(e) {}

            startLoading();

            try {
                const savedMastered = localStorage.getItem('ia_review_mastered');
                if (savedMastered) {
                    masteredCards = new Set(JSON.parse(savedMastered));
                }
            } catch(e) {}

            const dataSource = typeof appData === 'undefined' ? {} : appData;
            const iaShortAnswers = dataSource.ia_short_answers;
            if (!iaShortAnswers || !Array.isArray(iaShortAnswers.cards)) {
                document.getElementById('sections-wrapper').innerHTML = `
                    <div class="empty-state" style="padding:40px; text-align:center; color:var(--text-weak);">
                        未加载到讲义卡片数据，请确认 data.js 配置。
                    </div>`;
                return;
            }

            iaCards = iaShortAnswers.cards;
            const sectionsWrapper = document.getElementById('sections-wrapper');
            sectionsWrapper.innerHTML = '';

            sectionInfo.forEach((section, secIdx) => {
                const sectionCards = iaCards.filter(c => {
                    const title = c.title || "";
                    return title.startsWith(section.prefix);
                });

                const sectionEl = document.createElement('section');
                sectionEl.className = 'section-card';
                sectionEl.id = section.id;

                const headerEl = document.createElement('div');
                headerEl.className = 'section-header';
                
                const titleWrap = document.createElement('div');
                titleWrap.className = 'section-title-wrap';

                const iconContainer = document.createElement('div');
                iconContainer.className = 'section-icon';
                const icons = ['1', '2', '3', '4', '5', '6', '7', '8', '⚙️'];
                iconContainer.innerHTML = icons[secIdx] === '⚙️' ? '<i class="fa-solid fa-gear"></i>' : `<b>${icons[secIdx]}</b>`;
                
                const titleEl = document.createElement('h2');
                titleEl.textContent = section.name;

                titleWrap.appendChild(iconContainer);
                titleWrap.appendChild(titleEl);
                headerEl.appendChild(titleWrap);

                const starStatus = document.createElement('div');
                starStatus.className = 'section-star-status';
                starStatus.id = `stars-${section.id}`;
                starStatus.innerHTML = `<i class="fa-solid fa-star"></i> <span>0/${sectionCards.length}</span>`;
                headerEl.appendChild(starStatus);

                sectionEl.appendChild(headerEl);

                const listEl = document.createElement('div');
                listEl.className = 'card-list';

                if (sectionCards.length === 0) {
                    listEl.innerHTML = `<div style="color:var(--text-weak); font-size:0.9rem; padding:10px 0;">暂无考点数据</div>`;
                } else {
                    sectionCards.forEach(card => {
                        const globalIndex = iaCards.indexOf(card);
                        const isMastered = masteredCards.has(globalIndex);
                        const isKey = isKeyCard(card);

                        const itemEl = document.createElement('div');
                        itemEl.className = `card-item ${isMastered ? 'mastered' : ''}`;
                        itemEl.id = `card-item-${globalIndex}`;

                        const itemHeader = document.createElement('div');
                        itemHeader.className = 'card-item-header';

                        const cardTitleEl = document.createElement('span');
                        cardTitleEl.className = 'card-title';
                        cardTitleEl.innerHTML = `<i class="fa-solid fa-crown" style="color:var(--gold-400); margin-right: 4px; ${isMastered ? 'display:inline-block;' : 'display:none;'}"></i> ${card.title}`;

                        const badgeGroup = document.createElement('div');
                        badgeGroup.className = 'badge-group';

                        if (isKey) {
                            const keyBadge = document.createElement('span');
                            keyBadge.className = 'key-badge';
                            keyBadge.innerHTML = `<i class="fa-solid fa-fire"></i> 核心高频考点`;
                            badgeGroup.appendChild(keyBadge);
                        }

                        itemHeader.appendChild(cardTitleEl);
                        itemHeader.appendChild(badgeGroup);

                        const qEl = document.createElement('p');
                        qEl.className = 'card-q';
                        qEl.innerHTML = card.q;

                        // Answer wrapper (frosted glass mode supports)
                        const aWrapEl = document.createElement('div');
                        aWrapEl.className = 'concept-a-wrap';

                        const maskEl = document.createElement('div');
                        maskEl.className = `recite-mask ${(!reciteModeActive || isMastered) ? 'hidden-mask' : ''}`;
                        maskEl.id = `mask-${globalIndex}`;
                        maskEl.onclick = (e) => revealAnswer(globalIndex, e);
                        maskEl.innerHTML = `
                            <div class="recite-mask-content">
                                <i class="fa-solid fa-eye-slash"></i>
                                <span>点击解封背诵答案</span>
                            </div>
                        `;

                        const realContent = document.createElement('div');
                        realContent.className = 'real-answer-content';

                        const tipEl = document.createElement('div');
                        tipEl.className = 'concept-mnemonic';
                        tipEl.innerHTML = `
                            <span class="mnemonic-icon">🧠</span>
                            <div class="mnemonic-content">
                                <strong>记忆口诀：</strong>${card.tip || '暂无口诀'}
                            </div>
                        `;

                        const aDetail = document.createElement('div');
                        aDetail.className = 'concept-a-detail';
                        
                        const aTitle = document.createElement('span');
                        aTitle.className = 'concept-a-title';
                        aTitle.textContent = "参考解析与得分要点";

                        const aContent = document.createElement('div');
                        aContent.className = 'prose prose-sm';
                        aContent.innerHTML = card.a || '暂无详细解答';

                        aDetail.appendChild(aTitle);
                        aDetail.appendChild(aContent);

                        realContent.appendChild(tipEl);
                        realContent.appendChild(aDetail);

                        aWrapEl.appendChild(maskEl);
                        aWrapEl.appendChild(realContent);

                        // Actions footer
                        const footerEl = document.createElement('div');
                        footerEl.className = 'card-actions';

                        const masterBtn = document.createElement('button');
                        masterBtn.className = `master-btn ${isMastered ? 'btn-gold' : 'btn-blue'}`;
                        masterBtn.id = `master-btn-${globalIndex}`;
                        masterBtn.onclick = (e) => toggleMastery(globalIndex, e);
                        masterBtn.innerHTML = isMastered ? 
                            `<i class="fa-solid fa-crown"></i> 已降服` : 
                            `<i class="fa-solid fa-sword"></i> 降服考点`;

                        footerEl.appendChild(masterBtn);

                        itemEl.appendChild(itemHeader);
                        itemEl.appendChild(qEl);
                        itemEl.appendChild(aWrapEl);
                        itemEl.appendChild(footerEl);

                        listEl.appendChild(itemEl);
                    });
                }

                sectionEl.appendChild(listEl);
                sectionsWrapper.appendChild(sectionEl);
            });

            if (window.renderMathInElement) {
                renderMathInElement(sectionsWrapper, katexOptions);
            }

            updateHUD(true); // silent update on launch
            setupScrollObserver();
        }

        // Scroll to specific section ID
        function scrollToSection(id) {
            playTone(400, 'triangle', 0.1);
            const el = document.getElementById(id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Global mode switcher (Recite vs Read)
        function setGlobalMode(mode) {
            reciteModeActive = mode === 'recite';
            try {
                localStorage.setItem('ia_review_recite_mode', String(reciteModeActive));
            } catch(e) {}

            setGlobalModeUI(mode);
            playTone(600, 'sine', 0.08);

            // Apply overlay changes on all card items
            const masks = document.querySelectorAll('.recite-mask');
            masks.forEach(mask => {
                const globalIdx = parseInt(mask.id.replace('mask-', ''));
                if (reciteModeActive && !masteredCards.has(globalIdx)) {
                    mask.classList.remove('hidden-mask');
                } else {
                    mask.classList.add('hidden-mask');
                }
            });
        }

        function setGlobalModeUI(mode) {
            const btnRead = document.getElementById('btn-mode-read');
            const btnRecite = document.getElementById('btn-mode-recite');
            if (mode === 'recite') {
                btnRecite.classList.add('active');
                btnRead.classList.remove('active');
            } else {
                btnRead.classList.add('active');
                btnRecite.classList.remove('active');
            }
        }

        // Reveal answer on individual mask click
        function revealAnswer(index, e) {
            e.stopPropagation();
            playTone(800, 'triangle', 0.04);
            const mask = document.getElementById(`mask-${index}`);
            if (mask) {
                mask.classList.add('hidden-mask');
            }
        }

        // Toggle Mastery status on card click
        function toggleMastery(index, e) {
            e.stopPropagation();
            const isAlreadyMastered = masteredCards.has(index);
            const cardEl = document.getElementById(`card-item-${index}`);
            const btn = document.getElementById(`master-btn-${index}`);

            if (isAlreadyMastered) {
                // Cancel mastery
                masteredCards.delete(index);
                cardEl.classList.remove('mastered');
                
                // Hide crown
                const crownIcon = cardEl.querySelector('.card-title i');
                if (crownIcon) crownIcon.style.display = 'none';

                btn.className = 'master-btn btn-blue';
                btn.innerHTML = `<i class="fa-solid fa-sword"></i> 降服考点`;

                // If in recite mode, re-apply the frosted mask
                if (reciteModeActive) {
                    const mask = document.getElementById(`mask-${index}`);
                    if (mask) mask.classList.remove('hidden-mask');
                }

                playTone([300, 200], 'sine', 0.2);
            } else {
                // Master card
                masteredCards.add(index);
                cardEl.classList.add('mastered');

                // Show crown
                const crownIcon = cardEl.querySelector('.card-title i');
                if (crownIcon) crownIcon.style.display = 'inline-block';

                btn.className = 'master-btn btn-gold';
                btn.innerHTML = `<i class="fa-solid fa-crown"></i> 已降服`;

                // Always reveal when mastered
                const mask = document.getElementById(`mask-${index}`);
                if (mask) mask.classList.add('hidden-mask');

                // Play pleasant sound + trigger sparkles
                playTone([523.25, 659.25], 'sine', 0.22, 0.1);
                createConfetti(e.clientX, e.clientY);
            }

            try {
                localStorage.setItem('ia_review_mastered', JSON.stringify(Array.from(masteredCards)));
            } catch(err) {}

            updateHUD();
        }

        // Update levels, HUD status and chapter stars
        function updateHUD(silent = false) {
            const total = iaCards.length;
            const exp = masteredCards.size;
            
            let calculatedLevel = 1 + Math.floor((exp / total) * 8);
            if (calculatedLevel > 9) calculatedLevel = 9;

            if (!silent && calculatedLevel > currentLevel) {
                currentLevel = calculatedLevel;
                showLevelUpModal();
            } else {
                currentLevel = calculatedLevel;
            }

            document.getElementById('level-txt').textContent = levelTitles[currentLevel - 1];
            document.getElementById('xp-txt').textContent = `EXP: ${exp} / ${total}`;
            
            const ratio = total ? (exp / total) * 100 : 0;
            document.getElementById('xp-bar').style.width = `${ratio}%`;

            // Update star progress for each chapter section
            sectionInfo.forEach(section => {
                const sectionCards = iaCards.filter(c => c.title && c.title.startsWith(section.prefix));
                const masteredCount = sectionCards.filter(c => masteredCards.has(iaCards.indexOf(c))).length;
                
                const starsSpan = document.querySelector(`#stars-${section.id} span`);
                if (starsSpan) {
                    starsSpan.textContent = `${masteredCount}/${sectionCards.length}`;
                }
                
                const starBox = document.getElementById(`stars-${section.id}`);
                if (starBox) {
                    if (masteredCount === sectionCards.length && sectionCards.length > 0) {
                        starBox.classList.add('perfect');
                    } else {
                        starBox.classList.remove('perfect');
                    }
                }
            });
        }

        // Level Up popup display
        function showLevelUpModal() {
            document.getElementById('l-up-title').textContent = `晋升为【${levelTitles[currentLevel - 1]}】`;
            document.getElementById('level-up-modal').classList.add('show');
            // Play melodic upward synth
            playTone([523.25, 659.25, 784.00, 1046.50], 'triangle', 0.6, 0.12);
            createConfetti(window.innerWidth / 2, window.innerHeight / 2 - 100);
        }

        function closeLevelUpModal() {
            playTone(400, 'sine', 0.1);
            document.getElementById('level-up-modal').classList.remove('show');
        }

        // Sound volume toggler
        function toggleMute() {
            isMuted = !isMuted;
            try {
                localStorage.setItem('ia_review_muted', String(isMuted));
            } catch(e) {}
            updateAudioIcon();
            if (!isMuted) {
                playTone(600, 'sine', 0.1);
            }
        }

        function updateAudioIcon() {
            const icon = document.getElementById('audio-icon');
            if (isMuted) {
                icon.className = 'fa-solid fa-volume-mute';
            } else {
                icon.className = 'fa-solid fa-volume-high';
            }
        }

        // Svg road map tracker via Intersection Observer
        function setupScrollObserver() {
            const stations = document.querySelectorAll('.station');
            const sections = sectionInfo.map(sec => document.getElementById(sec.id)).filter(Boolean);
            const progressLine = document.getElementById('svg-progress-line');

            const observerOptions = {
                root: null,
                rootMargin: '-120px 0px -70% 0px',
                threshold: 0
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const sectionId = entry.target.id;
                        
                        stations.forEach(station => {
                            const target = station.getAttribute('data-target');
                            if (target === sectionId) {
                                if (!station.classList.contains('active')) {
                                    playTone(500, 'sine', 0.05, 0.02);
                                }
                                station.classList.add('active');
                                const container = document.querySelector('.roadmap-container');
                                const rect = station.getBoundingClientRect();
                                const cRect = container.getBoundingClientRect();
                                if (rect.left < cRect.left || rect.right > cRect.right) {
                                    container.scrollTo({
                                        left: station.transform.baseVal[0].matrix.e - 150,
                                        behavior: 'smooth'
                                    });
                                }
                            } else {
                                station.classList.remove('active');
                            }
                        });

                        // Calculate SVG progress line width
                        const activeIndex = sectionInfo.findIndex(sec => sec.id === sectionId);
                        if (activeIndex !== -1) {
                            const xCoordinates = [50, 162, 274, 386, 498, 610, 722, 834, 950];
                            const currentX = xCoordinates[activeIndex];
                            const ratio = (currentX - 50) / 900;
                            progressLine.style.strokeDashoffset = 900 - (900 * ratio);
                        }
                    }
                });
            }, observerOptions);

            sections.forEach(sec => observer.observe(sec));
        }

        window.addEventListener('DOMContentLoaded', initReview);
    </script>
</body>
</html>
