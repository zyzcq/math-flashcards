<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>复习中 - 记忆闪卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/study.css">
</head>
<body>

<script src="data.js"></script>

<div id="toast">🔀 已打乱卡片顺序</div>

<div class="app-container">
    <div class="p-6 pb-2 flex justify-between items-start z-20">
        <div>
            <a href="index.html" class="inline-flex items-center gap-1 text-slate-400 hover:text-slate-600 mb-2 transition-colors">
                <i class="fa-solid fa-angle-left text-sm"></i>
                <span class="text-xs font-bold">返回首页</span>
            </a>
            <h1 id="page-title" class="text-xl font-black text-slate-800">加载中...</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleFullScreen()" class="w-10 h-10 rounded-full bg-white border border-slate-200 text-slate-600 shadow-sm flex items-center justify-center hover:bg-slate-50 active:scale-95 transition-transform" title="全屏">
                <i class="fa-solid fa-expand" id="fullscreen-icon"></i>
            </button>
            <button onclick="shuffleCards()" class="w-10 h-10 rounded-full bg-white border border-slate-200 text-slate-600 shadow-sm flex items-center justify-center hover:bg-slate-50 active:scale-95 transition-transform" title="打乱顺序">
                <i class="fa-solid fa-shuffle"></i>
            </button>
        </div>
    </div>

    <div class="px-6 mt-1">
        <div class="flex justify-between text-[10px] font-bold text-slate-400 mb-1 tracking-wider uppercase">
            <span>Progress</span>
            <span id="progress-text">0 / 0</span>
        </div>
        <div class="h-2 w-full bg-slate-200 rounded-full overflow-hidden">
            <div id="progress-bar" class="h-full w-0 transition-all duration-300"></div>
        </div>
    </div>

    <div class="card-wrapper" id="swipe-zone">
        <div id="card" class="card" onclick="flipCard(event)">
            <div class="face front shadow-xl" id="front-face">
                <div class="absolute top-4 left-4 px-3 py-1 bg-white/20 backdrop-blur-sm rounded-full text-xs font-bold tracking-wider border border-white/30">
                    <span id="q-index">标签</span>
                </div>

                <div class="math-scroll-wrapper" id="q-wrapper">
                    <div id="q-text" class="text-3xl font-bold leading-normal drop-shadow-md px-2"></div>
                </div>

                <div class="absolute bottom-8 flex flex-col items-center text-white/80">
                    <span class="text-[10px] font-bold mb-1 tracking-widest uppercase">Tap to Flip</span>
                    <i class="fa-solid fa-arrow-rotate-right animate-bounce"></i>
                </div>
            </div>

            <div class="face back shadow-xl border border-slate-100">
                <div class="back-scroll-area">
                    <div class="mnemonic-box border-dashed border-2" id="tip-box">
                        <div class="font-black text-xs uppercase tracking-wider mb-2 border-b-2 pb-1 inline-block" id="tip-title">🧠 深度记忆解析</div>
                        <div id="mnemonic-content" class="mnemonic-text"></div>
                    </div>

                    <div class="flex-1 mt-1">
                        <div class="text-xs font-bold text-slate-400 uppercase mb-1 border-b border-slate-100 pb-1">答案核对</div>
                        <div class="math-scroll-wrapper" id="a-wrapper">
                            <div id="a-content"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="p-6 flex gap-4 z-20">
        <button onclick="prevCard()" id="prev-btn" class="flex-1 h-12 rounded-xl bg-white border border-slate-200 text-slate-600 shadow-sm flex items-center justify-center gap-2 active:scale-95 transition-transform disabled:opacity-50 disabled:active:scale-100">
            <i class="fa-solid fa-chevron-left text-sm"></i>
            <span class="font-bold text-sm">上一张</span>
        </button>
        <button onclick="nextCard()" id="next-btn" class="flex-1 h-12 rounded-xl text-white shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-transform">
            <span class="font-bold text-sm" id="next-text">下一张</span>
            <i class="fa-solid fa-chevron-right text-sm" id="next-icon"></i>
        </button>
    </div>
</div>

<script src="js/study.js"></script>
<script>
    (function checkLogin() {
        const session = localStorage.getItem('math_flashcard_session');
        if (!session) {
            window.location.href = 'login.html';
        }
    })();
</script>
</body>
</html>
